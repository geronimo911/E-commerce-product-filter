<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NexStore | Premium Eco-System</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
</head>
<body>
    <div class="mesh-bg">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
        <div class="noise-overlay"></div>
    </div>

    <nav class="glass-nav">
        <div class="nav-content">
            <div class="logo">NEX<span>STORE</span></div>
            <div class="nav-center">
                <span class="nav-tagline">Premium Collection 2025</span>
            </div>
            <div class="nav-actions">
                <button id="themeToggle" class="icon-btn" aria-label="Toggle Theme">
                    <span class="theme-icon">◑</span>
                </button>
                <div class="cart-trigger" id="cartTrigger">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
                    <span id="cartCount">0</span>
                    <div class="cart-pulse" id="cartPulse"></div>
                </div>
            </div>
        </div>
    </nav>

    <main class="app-container">
        <aside class="sidebar" id="sidebar">
            <div class="filter-card">
                <div class="filter-header">
                    <div>
                        <h3 class="filter-title">Refine</h3>
                        <p class="filter-sub">Discover curated pieces</p>
                    </div>
                    <button id="resetBtn" class="text-link">↺ Reset</button>
                </div>

                <div class="divider"></div>
                
                <div class="input-group">
                    <label>Search</label>
                    <div class="search-wrap">
                        <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
                        <input type="text" id="searchInput" placeholder="Find something...">
                    </div>
                </div>

                <div class="input-group">
                    <label>Category</label>
                    <div class="select-wrap">
                        <select id="categorySelect">
                            <option value="all">All Collections</option>
                            <option value="electronics">Electronics</option>
                            <option value="fashion">Fashion</option>
                            <option value="lifestyle">Lifestyle</option>
                            <option value="audio">Audio</option>
                        </select>
                        <svg class="select-arrow" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="6 9 12 15 18 9"/></svg>
                    </div>
                </div>

                <div class="input-group">
                    <label>Budget <span id="priceVal" class="price-badge">₹1,50,000</span></label>
                    <div class="range-wrap">
                        <input type="range" id="priceRange" min="0" max="150000" step="1000" value="150000">
                        <div class="range-track">
                            <div class="range-fill" id="rangeFill"></div>
                        </div>
                    </div>
                </div>

                <div class="input-group">
                    <label>Sort By</label>
                    <div class="select-wrap">
                        <select id="sortSelect">
                            <option value="default">Featured</option>
                            <option value="price-asc">Price: Low → High</option>
                            <option value="price-desc">Price: High → Low</option>
                            <option value="name">Name A–Z</option>
                        </select>
                        <svg class="select-arrow" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="6 9 12 15 18 9"/></svg>
                    </div>
                </div>

                <div class="filter-stats">
                    <span id="productCount">18 products</span>
                </div>
            </div>
        </aside>

        <section class="content">
            <div class="content-header">
                <h1 class="section-title">Collection</h1>
                <div class="view-toggle">
                    <button class="view-btn active" id="gridView" aria-label="Grid view">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
                    </button>
                    <button class="view-btn" id="listView" aria-label="List view">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="4" width="18" height="3"/><rect x="3" y="10.5" width="18" height="3"/><rect x="3" y="17" width="18" height="3"/></svg>
                    </button>
                </div>
            </div>
            <div id="productGrid" class="product-grid"></div>
            <div id="noResults" class="empty-state hidden">
                <div class="empty-art">🛰️</div>
                <p>No masterpieces found in this orbit.</p>
                <button id="emptyReset" class="empty-reset-btn">Clear Filters</button>
            </div>
        </section>
    </main>

    <!-- Cart Drawer -->
    <div class="cart-overlay" id="cartOverlay"></div>
    <div id="cartDrawer" class="cart-drawer">
        <div class="drawer-header">
            <div>
                <h2 class="drawer-title">Your Bag</h2>
                <p class="drawer-sub" id="drawerSub">0 items</p>
            </div>
            <button id="closeCart" class="close-btn" aria-label="Close cart">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
        </div>

        <div class="cart-body">
            <div id="cartItems" class="cart-items-list"></div>
            <div id="emptyCart" class="empty-cart">
                <div class="empty-cart-icon">🛍️</div>
                <p>Your bag is empty</p>
                <small>Add items to get started</small>
            </div>
        </div>

        <div class="drawer-footer">
            <div class="total-row">
                <span>Subtotal</span>
                <span id="cartTotal" class="total-amount">₹0</span>
            </div>
            <div class="total-row savings-row" id="savingsRow" style="display:none">
                <span>You save</span>
                <span id="savingsAmt" class="savings-amount">₹0</span>
            </div>
            <button class="checkout-btn">
                <span>Proceed to Checkout</span>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
            </button>
        </div>
    </div>

    <div id="toast" class="toast">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
        <span id="toastMsg">Added to bag</span>
    </div>

    <script src="script.js"></script>
</body>
</html>
